<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Purchase order</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #f1f5f9; font-family: sans-serif; }

  body { display: flex; align-items: center; justify-content: center; }
  #diagram {
    border: 1px solid #cbd5e1;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    background: #ffffff;
    overflow: hidden;
    position: relative;
  }

</style>
</head>
<body>
<div id="diagram"></div>
<script src="https://viewer.diagrams.net/js/viewer-static.min.js"></script>
<script>

function fitGraph(viewer, container) {
  if (!viewer || !viewer.graph) return;
  var graph = viewer.graph;
  graph.view.setScale(1);
  graph.view.setTranslate(0, 0);
  var bounds = graph.getGraphBounds();
  if (!bounds || bounds.width <= 0 || bounds.height <= 0) return;
  var pad = 30;
  var availW = container.clientWidth - pad * 2;
  var availH = container.clientHeight - pad * 2;
  var scale = Math.min(availW / bounds.width, availH / bounds.height);
  if (scale > 4) scale = 4;
  if (scale < 0.1) scale = 0.1;
  graph.view.setScale(scale);
  var b2 = graph.getGraphBounds();
  var tx = (container.clientWidth - b2.width) / 2 - b2.x;
  var ty = (container.clientHeight - b2.height) / 2 - b2.y;
  graph.view.setTranslate(tx / scale, ty / scale);
}

var xmlStr = "<mxGraphModel dx=\"1422\" dy=\"762\" grid=\"1\" gridSize=\"10\" guides=\"1\" tooltips=\"1\" connect=\"1\" arrows=\"1\" fold=\"1\" page=\"1\" pageScale=\"1\" pageWidth=\"1169\" pageHeight=\"827\" math=\"0\" shadow=\"0\"><root><mxCell id=\"0\" /><mxCell id=\"1\" parent=\"0\" /><mxCell id=\"2\" value=\"Company\" style=\"shape=swimlane;startSize=30;horizontal=0;fillColor=#f8fafc;strokeColor=#475569;fontSize=11;fontStyle=1;align=center;\" vertex=\"1\" parent=\"1\"><mxGeometry x=\"30\" y=\"30\" width=\"1454\" height=\"240\" as=\"geometry\" /></mxCell><mxCell id=\"3\" value=\"Sales\" style=\"shape=swimlane;startSize=24;horizontal=0;fillColor=#ffffff;strokeColor=#94a3b8;fontSize=10;align=center;\" vertex=\"1\" parent=\"1\"><mxGeometry x=\"60\" y=\"30\" width=\"1424\" height=\"120\" as=\"geometry\" /></mxCell><mxCell id=\"4\" value=\"Finance\" style=\"shape=swimlane;startSize=24;horizontal=0;fillColor=#ffffff;strokeColor=#94a3b8;fontSize=10;align=center;\" vertex=\"1\" parent=\"1\"><mxGeometry x=\"60\" y=\"150\" width=\"1424\" height=\"120\" as=\"geometry\" /></mxCell><mxCell id=\"5\" value=\"start\" style=\"ellipse;whiteSpace=wrap;html=1;fillColor=#dcfce7;strokeColor=#15803d;strokeWidth=2;fontSize=9;\" vertex=\"1\" parent=\"1\"><mxGeometry x=\"104\" y=\"62\" width=\"56\" height=\"56\" as=\"geometry\" /></mxCell><mxCell id=\"6\" value=\"end\" style=\"ellipse;whiteSpace=wrap;html=1;fillColor=#fecaca;strokeColor=#b91c1c;strokeWidth=3;fontSize=9;\" vertex=\"1\" parent=\"1\"><mxGeometry x=\"1294\" y=\"182\" width=\"56\" height=\"56\" as=\"geometry\" /></mxCell><mxCell id=\"7\" value=\"Take order\" style=\"rounded=1;arcSize=18;whiteSpace=wrap;html=1;fillColor=#dcfce7;strokeColor=#15803d;fontSize=10;\" vertex=\"1\" parent=\"1\"><mxGeometry x=\"274\" y=\"60\" width=\"110\" height=\"60\" as=\"geometry\" /></mxCell><mxCell id=\"8\" value=\"Validate\" style=\"rounded=1;arcSize=18;whiteSpace=wrap;html=1;fillColor=#fef3c7;strokeColor=#a16207;fontSize=10;\" vertex=\"1\" parent=\"1\"><mxGeometry x=\"444\" y=\"60\" width=\"110\" height=\"60\" as=\"geometry\" /></mxCell><mxCell id=\"9\" value=\"Approve\" style=\"rounded=1;arcSize=18;whiteSpace=wrap;html=1;fillColor=#dcfce7;strokeColor=#15803d;fontSize=10;\" vertex=\"1\" parent=\"1\"><mxGeometry x=\"784\" y=\"180\" width=\"110\" height=\"60\" as=\"geometry\" /></mxCell><mxCell id=\"10\" value=\"Post to ledger\" style=\"rounded=1;arcSize=18;whiteSpace=wrap;html=1;fillColor=#fef3c7;strokeColor=#a16207;fontSize=10;\" vertex=\"1\" parent=\"1\"><mxGeometry x=\"1124\" y=\"180\" width=\"110\" height=\"60\" as=\"geometry\" /></mxCell><mxCell id=\"11\" value=\"\u2715\" style=\"rhombus;whiteSpace=wrap;html=1;fillColor=#fef9c3;strokeColor=#a16207;fontSize=14;fontStyle=1;\" vertex=\"1\" parent=\"1\"><mxGeometry x=\"614\" y=\"68\" width=\"44\" height=\"44\" as=\"geometry\" /></mxCell><mxCell id=\"12\" value=\"\u2715\" style=\"rhombus;whiteSpace=wrap;html=1;fillColor=#fef9c3;strokeColor=#a16207;fontSize=14;fontStyle=1;\" vertex=\"1\" parent=\"1\"><mxGeometry x=\"954\" y=\"188\" width=\"44\" height=\"44\" as=\"geometry\" /></mxCell><mxCell id=\"13\" value=\"\" style=\"endArrow=block;endFill=1;html=1;rounded=0;strokeColor=#1f2937;fontSize=10;\" edge=\"1\" source=\"5\" target=\"7\" parent=\"1\"><mxGeometry relative=\"1\" as=\"geometry\" /></mxCell><mxCell id=\"14\" value=\"\" style=\"endArrow=block;endFill=1;html=1;rounded=0;strokeColor=#1f2937;fontSize=10;\" edge=\"1\" source=\"7\" target=\"8\" parent=\"1\"><mxGeometry relative=\"1\" as=\"geometry\" /></mxCell><mxCell id=\"15\" value=\"\" style=\"endArrow=block;endFill=1;html=1;rounded=0;strokeColor=#1f2937;fontSize=10;\" edge=\"1\" source=\"8\" target=\"11\" parent=\"1\"><mxGeometry relative=\"1\" as=\"geometry\" /></mxCell><mxCell id=\"16\" value=\"&gt; $10k\" style=\"endArrow=block;endFill=1;html=1;rounded=0;strokeColor=#1f2937;startArrow=diamondThin;startFill=0;startSize=10;fontSize=10;\" edge=\"1\" source=\"11\" target=\"9\" parent=\"1\"><mxGeometry relative=\"1\" as=\"geometry\" /></mxCell><mxCell id=\"17\" value=\"auto\" style=\"endArrow=block;endFill=1;html=1;rounded=0;strokeColor=#1f2937;startArrow=oval;startFill=0;startSize=8;fontSize=10;\" edge=\"1\" source=\"11\" target=\"12\" parent=\"1\"><mxGeometry relative=\"1\" as=\"geometry\" /></mxCell><mxCell id=\"18\" value=\"\" style=\"endArrow=block;endFill=1;html=1;rounded=0;strokeColor=#1f2937;fontSize=10;\" edge=\"1\" source=\"9\" target=\"12\" parent=\"1\"><mxGeometry relative=\"1\" as=\"geometry\" /></mxCell><mxCell id=\"19\" value=\"\" style=\"endArrow=block;endFill=1;html=1;rounded=0;strokeColor=#1f2937;fontSize=10;\" edge=\"1\" source=\"12\" target=\"10\" parent=\"1\"><mxGeometry relative=\"1\" as=\"geometry\" /></mxCell><mxCell id=\"20\" value=\"\" style=\"endArrow=block;endFill=1;html=1;rounded=0;strokeColor=#1f2937;fontSize=10;\" edge=\"1\" source=\"10\" target=\"6\" parent=\"1\"><mxGeometry relative=\"1\" as=\"geometry\" /></mxCell></root></mxGraphModel>";
var config = {"nav": true, "resize": false, "toolbar": "zoom layers lightbox", "fit": true, "page": false};
var container = document.getElementById('diagram');
function setSize() {
  container.style.width  = Math.round(window.innerWidth  * 0.85) + 'px';
  container.style.height = Math.round(window.innerHeight * 0.85) + 'px';
}
setSize();
if (typeof GraphViewer === 'undefined') {
  container.innerHTML = '<div style="padding:32px;font-family:sans-serif;color:#7f1d1d;">' +
    '<strong>draw.io viewer not loaded.</strong></div>';
} else {
  var xmlDoc = mxUtils.parseXml(xmlStr);
  var viewer = new GraphViewer(container, xmlDoc.documentElement, config);
  setTimeout(function() { fitGraph(viewer, container); }, 50);
  window.addEventListener('resize', function() {
    setSize();
    fitGraph(viewer, container);
  });
}
</script>
</body>
</html>
